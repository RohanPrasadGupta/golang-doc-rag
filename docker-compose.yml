services:
  postgres:
    image: postgres:17
    container_name: rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docrag
    ports:
      - "5432:5432"
    volumes:
      - rag-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d docrag"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  rag-pgdata: